<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skolotāja skats · 9. klase · 5. tēma</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    color: white;
    overflow-x: hidden;
  }
  .blob {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  }
  .blob1 { width:500px;height:500px;top:-150px;right:-150px;background:radial-gradient(circle,#312e8155 0%,transparent 70%); }
  .blob2 { width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,#78350f44 0%,transparent 70%); }

  header {
    position:relative;z-index:10;
    background:rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 32px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  .logo { display:flex;align-items:center;gap:12px; }
  .logo-icon { font-size:32px; }
  .logo-text { font-size:20px;font-weight:900;color:white; }
  .logo-sub { font-size:13px;color:#94a3b8;font-weight:600;margin-top:2px; }
  .header-right { display:flex;align-items:center;gap:16px; }
  .conn-bar { font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px; }
  .conn-dot { width:8px;height:8px;border-radius:50%; }
  .conn-ok { background:#22c55e; }
  .conn-err { background:#ef4444; }
  .reset-btn {
    background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);
    border-radius:10px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;
    font-family:'Nunito',sans-serif;transition:all .2s;
  }
  .reset-btn:hover { background:rgba(239,68,68,0.25); }

  main {
    position:relative;z-index:5;
    display:grid;
    grid-template-columns: 1fr 280px;
    gap:24px;
    max-width:1200px;margin:0 auto;padding:28px 24px 40px;
  }

  /* Kreisā puse — rezultāti */
  .results-panel {}
  .question-title {
    font-size:22px;font-weight:900;color:white;
    margin-bottom:28px;line-height:1.4;
  }
  .total-badge {
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);
    border-radius:999px;padding:6px 16px;font-size:14px;font-weight:700;
    color:#a5b4fc;margin-bottom:24px;
  }

  .result-item {
    margin-bottom:20px;
  }
  .result-top {
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-bottom:8px;gap:12px;
  }
  .result-label {
    font-size:15px;font-weight:700;color:#e2e8f0;line-height:1.4;flex:1;
  }
  .result-numbers {
    font-size:14px;font-weight:800;color:#94a3b8;white-space:nowrap;
    text-align:right;
  }
  .result-pct-big { font-size:22px;font-weight:900;color:white; }
  .bar-track {
    height:18px;background:rgba(255,255,255,0.06);
    border-radius:999px;overflow:hidden;
  }
  .bar-fill {
    height:100%;border-radius:999px;
    transition:width .6s cubic-bezier(.4,0,.2,1);
    position:relative;
  }
  .bar-fill::after {
    content:'';position:absolute;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15));
    border-radius:999px;
  }

  /* Labā puse — QR */
  .qr-panel {
    display:flex;flex-direction:column;gap:16px;
  }
  .qr-card {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:24px;text-align:center;
  }
  .qr-label { font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:16px;text-transform:uppercase;letter-spacing:1px; }
  .qr-box {
    background:white;border-radius:16px;padding:16px;
    display:inline-block;margin-bottom:16px;
  }
  .qr-url { font-size:12px;color:#64748b;word-break:break-all;line-height:1.4; }

  .stats-card {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;padding:20px;
  }
  .stats-title { font-size:13px;font-weight:700;color:#94a3b8;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px; }
  .stat-row {
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .stat-row:last-child { border-bottom:none; }
  .stat-label { font-size:14px;color:#94a3b8; }
  .stat-value { font-size:18px;font-weight:900;color:white; }

  .live-badge {
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);
    border-radius:999px;padding:5px 14px;font-size:12px;font-weight:700;color:#4ade80;
  }
  .live-dot {
    width:7px;height:7px;border-radius:50%;background:#22c55e;
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;} 50%{opacity:0.3;}
  }

  @media (max-width: 700px) {
    main { grid-template-columns:1fr; }
    .qr-panel { order:-1; }
  }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<header>
  <div class="logo">
    <span class="logo-icon">🎨</span>
    <div>
      <div class="logo-text">9. klase · 5. tēma</div>
      <div class="logo-sub">Pašportrets un identitāte vizuālajā mākslā</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div class="conn-bar">
      <div class="conn-dot conn-ok" id="conn-dot"></div>
      <span id="conn-text">Savienots</span>
    </div>
    <button class="reset-btn" onclick="resetVotes()">🔄 Atiestatīt</button>
  </div>
</header>

<main>
  <!-- Kreisā puse: rezultāti -->
  <div class="results-panel">
    <div class="question-title">Kā pašportrets saistās ar mākslinieka identitāti?</div>
    <div class="total-badge">👥 Kopā balsojuši: <span id="total-count">0</span></div>
    <div id="results-list"></div>
  </div>

  <!-- Labā puse: QR + statistika -->
  <div class="qr-panel">
    <div class="qr-card">
      <div class="qr-label">📱 Skolēni skenē šeit</div>
      <div class="qr-box">
        <div id="qrcode"></div>
      </div>
      <div class="qr-url">jolantagrosberga.github.io</div>
    </div>

    <div class="stats-card">
      <div class="stats-title">📊 Statistika</div>
      <div class="stat-row">
        <span class="stat-label">Kopā balsis</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Populārākā atbilde</span>
        <span class="stat-value" id="stat-top">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Atbilžu varianti</span>
        <span class="stat-value">5</span>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfsAK78eIDfSXdV2rJBM1ZbCdXcwx0YDQ",
    authDomain: "klases-aptauja---9kl---5.firebaseapp.com",
    databaseURL: "https://klases-aptauja---9kl---5-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "klases-aptauja---9kl---5",
    storageBucket: "klases-aptauja---9kl---5.firebasestorage.app",
    messagingSenderId: "281597110184",
    appId: "1:281597110184:web:13817250b72ea39f845f9d"
  };

  const COLORS = ['#FF6B6B','#FFA235','#4ECDC4','#45B7D1','#96CEB4'];
  const POLL_ID = "9kl-tema5-paspportrets";
  const OPTIONS = [
    "Mākslinieka identitāti var izteikt tikai pašportretā",
    "Pašportrets ir kā mākslinieka iekšējās pasaules spogulis — viens no identitātes izteikšanas veidiem",
    "Mākslinieka identitāte izpaužas tikai viņa mākslas darbos",
    "Identitāti nevar izteikt ar mākslu",
    "Pašportrets neizsaka identitāti, bet mākslinieka iekšējās sajūtas"
  ];

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let votes = OPTIONS.map(() => 0);

  // QR kods
  new QRCode(document.getElementById("qrcode"), {
    text: "https://jolantagrosberga.github.io",
    width: 180, height: 180,
    colorDark: "#1e1b4b", colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  // Savienojums
  onValue(ref(db, '.info/connected'), snap => {
    const ok = snap.val();
    document.getElementById('conn-dot').className = 'conn-dot ' + (ok ? 'conn-ok' : 'conn-err');
    document.getElementById('conn-text').textContent = ok ? 'Savienots' : 'Nav savienojuma';
  });

  // Reāllaika rezultāti
  onValue(ref(db, 'aptaujas/' + POLL_ID + '/votes'), snap => {
    if (snap.val()) votes = snap.val();
    render();
  });

  function render() {
    const total = votes.reduce((a,b) => a+b, 0);
    document.getElementById('total-count').textContent = total;
    document.getElementById('stat-total').textContent = total;

    // Populārākā atbilde
    const maxIdx = votes.indexOf(Math.max(...votes));
    document.getElementById('stat-top').textContent = total > 0 ? (maxIdx + 1) + '. variants' : '—';

    // Rezultātu joslas
    document.getElementById('results-list').innerHTML = OPTIONS.map((opt, i) => {
      const pct = total ? Math.round(votes[i]/total*100) : 0;
      const color = COLORS[i];
      const isTop = total > 0 && votes[i] === Math.max(...votes);
      return `<div class="result-item">
        <div class="result-top">
          <div class="result-label">${isTop ? '🏆 ' : ''}${opt}</div>
          <div class="result-numbers">
            <div class="result-pct-big" style="color:${color}">${pct}%</div>
            <div style="font-size:12px;color:#64748b">${votes[i]} balsis</div>
          </div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${color},${color}cc)"></div>
        </div>
      </div>`;
    }).join('');
  }

  window.resetVotes = async function() {
    if (!confirm('Atiestatīt visus balsojumus?')) return;
    await update(ref(db, 'aptaujas/' + POLL_ID), { votes: OPTIONS.map(() => 0) });
  };
</script>
</body>
</html>
