<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domu Karte</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f0e8;--ink:#1c1814;--soft:#7a6d62;--border:#ddd5c8;--panel:#fff;--sh:rgba(0,0,0,0.13)}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);display:flex;flex-direction:column;height:100vh;user-select:none}
#tb{background:var(--panel);border-bottom:2px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;box-shadow:0 2px 10px var(--sh);z-index:100}
#tb h1{font-family:'Caveat',cursive;font-size:24px;color:#e8694a;white-space:nowrap}
.sep{width:1px;height:28px;background:var(--border);flex-shrink:0}
.btn{padding:6px 13px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;transition:all .15s;white-space:nowrap}
.bp{background:#e8694a;color:#fff;border-color:#e8694a}.bp:hover{filter:brightness(1.1)}
.bg{background:transparent;color:var(--soft);border-color:var(--border)}.bg:hover{background:var(--bg)}
.bd{background:transparent;color:#c0392b;border-color:#c0392b}.bd:hover{background:#c0392b;color:#fff}
.mb{padding:6px 11px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--soft);transition:all .15s}
.mb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cd{width:22px;height:22px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.cd:hover{transform:scale(1.2)}.cd.on{border-color:var(--ink);transform:scale(1.15)}
#wrap{flex:1;position:relative;overflow:hidden;background:var(--bg);background-image:radial-gradient(circle,#c5b9ad 1px,transparent 1px);background-size:26px 26px;touch-action:none}
#svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
#cv{position:absolute;inset:0;z-index:2}
.node{position:absolute;border-radius:14px;padding:10px 16px;min-width:90px;max-width:190px;text-align:center;word-break:break-word;cursor:grab;z-index:10;box-shadow:0 4px 18px var(--sh);border:3px solid rgba(255,255,255,0.45);transition:box-shadow .15s;touch-action:none}
.node:hover{box-shadow:0 8px 28px rgba(0,0,0,0.2)}
.node.drag{cursor:grabbing;z-index:50;box-shadow:0 14px 40px rgba(0,0,0,0.25)}
.node.root{border-radius:22px;padding:13px 20px;min-width:120px}
.nt{font-family:'Caveat',cursive;font-size:19px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.3);pointer-events:none;line-height:1.25}
.node.root .nt{font-size:23px}
.ndel{position:absolute;top:-10px;right:-10px;width:22px;height:22px;border-radius:50%;background:#c0392b;color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:900;line-height:22px;text-align:center;display:none;z-index:20;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.node:hover .ndel{display:block}
.csrc{outline:3px solid #4a90d9;outline-offset:3px}
#ov{position:fixed;inset:0;background:rgba(20,16,14,.55);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#ov.hide{display:none}
#mo{background:var(--panel);border-radius:20px;padding:28px;width:360px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,0.22)}
#mo h2{font-family:'Caveat',cursive;font-size:26px;margin-bottom:16px;color:var(--ink)}
#mi{width:100%;padding:11px 14px;border-radius:10px;border:2px solid var(--border);font-family:'Caveat',cursive;font-size:22px;font-weight:600;color:var(--ink);background:var(--bg);margin-bottom:14px;outline:none}
#mi:focus{border-color:#e8694a}
#mc{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.mcd{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.mcd.on{border-color:var(--ink);transform:scale(1.12)}
#mb{display:flex;gap:8px;justify-content:flex-end}
#zc{position:fixed;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:200}
.zb{width:36px;height:36px;border-radius:9px;border:2px solid var(--border);background:var(--panel);cursor:pointer;font-size:18px;font-weight:900;color:var(--soft);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--sh);transition:all .15s}
.zb:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(28,24,20,.82);color:#fff;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;z-index:150;white-space:nowrap;pointer-events:none;transition:opacity .3s}
</style>
</head>
<body>

<div id="tb">
  <h1>🧠 Domu Karte</h1>
  <div class="sep"></div>
  <button class="mb on" id="mm" onclick="setMode('move')">✋ Pārvietot</button>
  <button class="mb" id="mc2" onclick="setMode('conn')">🔗 Savienot</button>
  <div class="sep"></div>
  <button class="btn bp" onclick="openAdd()">＋ Pievienot</button>
  <button class="btn bg" onclick="addRoot()">⭐ Centrāls</button>
  <div class="sep"></div>
  <div style="display:flex;gap:5px;align-items:center" id="cp">
    <div class="cd on" style="background:#e8694a" data-c="#e8694a" onclick="pickC(this)"></div>
    <div class="cd" style="background:#4a90d9" data-c="#4a90d9" onclick="pickC(this)"></div>
    <div class="cd" style="background:#48b56a" data-c="#48b56a" onclick="pickC(this)"></div>
    <div class="cd" style="background:#f0a500" data-c="#f0a500" onclick="pickC(this)"></div>
    <div class="cd" style="background:#9b59b6" data-c="#9b59b6" onclick="pickC(this)"></div>
    <div class="cd" style="background:#e91e8c" data-c="#e91e8c" onclick="pickC(this)"></div>
    <div class="cd" style="background:#1a8a7a" data-c="#1a8a7a" onclick="pickC(this)"></div>
    <div class="cd" style="background:#7a5230" data-c="#7a5230" onclick="pickC(this)"></div>
  </div>
  <div class="sep"></div>
  <button class="btn bd" onclick="doClear()">🗑 Notīrīt visu</button>
</div>

<div id="wrap">
  <svg id="svg"><defs></defs></svg>
  <div id="cv"></div>
</div>

<div id="ov" class="hide">
  <div id="mo">
    <h2 id="mt">Jauns mezgls</h2>
    <input type="text" id="mi" placeholder="Ievadi tekstu..." maxlength="80" autocomplete="off">
    <div id="mc">
      <div class="mcd on" style="background:#e8694a" data-c="#e8694a" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#4a90d9" data-c="#4a90d9" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#48b56a" data-c="#48b56a" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#f0a500" data-c="#f0a500" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#9b59b6" data-c="#9b59b6" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#e91e8c" data-c="#e91e8c" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#1a8a7a" data-c="#1a8a7a" onclick="pickMC(this)"></div>
      <div class="mcd" style="background:#7a5230" data-c="#7a5230" onclick="pickMC(this)"></div>
    </div>
    <div id="mb">
      <button class="btn bg" onclick="closeModal()">Atcelt</button>
      <button class="btn bp" onclick="saveNode()">Saglabāt</button>
    </div>
  </div>
</div>

<div id="zc">
  <button class="zb" onclick="doZoom(1.15)">＋</button>
  <button class="zb" onclick="doZoom(0.87)">－</button>
  <button class="zb" onclick="resetView()">⌂</button>
</div>
<div id="hint">💡 Divkārt klikšķini uz fona → jauns mezgls &nbsp;|&nbsp; Velc mezglus</div>

<script>
// Visi dati tikai pārlūka atmiņā — aizvērojot logu viss pazūd
let mode='move', color='#e8694a', mcolor='#e8694a';
let nodes={}, conns={}, editId=null, connFrom=null;
let sc=1, px=0, py=0;
let nodeCounter=0, connCounter=0;

function newId(){ return 'n'+(++nodeCounter)+'_'+Date.now(); }
function newCId(){ return 'c'+(++connCounter)+'_'+Date.now(); }

function setMode(m){
  mode=m;
  document.getElementById('mm').classList.toggle('on',m==='move');
  document.getElementById('mc2').classList.toggle('on',m==='conn');
  connFrom=null;
  document.querySelectorAll('.csrc').forEach(e=>e.classList.remove('csrc'));
  document.getElementById('wrap').style.cursor=m==='conn'?'crosshair':'default';
  setHint(m==='conn'?'🔗 Klikšķini uz pirmā mezgla, tad uz otrā':'💡 Divkārt klikšķini uz fona → jauns mezgls  |  Velc mezglus');
}

function pickC(el){document.querySelectorAll('#cp .cd').forEach(d=>d.classList.remove('on'));el.classList.add('on');color=el.dataset.c;mcolor=color;syncMC();}
function pickMC(el){document.querySelectorAll('#mc .mcd').forEach(d=>d.classList.remove('on'));el.classList.add('on');mcolor=el.dataset.c;}
function syncMC(){document.querySelectorAll('#mc .mcd').forEach(d=>d.classList.toggle('on',d.dataset.c===mcolor));}

let pendPos=null;
function openAdd(x,y){
  pendPos=(x!=null)?{x,y}:null;editId=null;
  document.getElementById('mt').textContent='Jauns mezgls';
  document.getElementById('mi').value='';
  mcolor=color;syncMC();
  document.getElementById('ov').classList.remove('hide');
  setTimeout(()=>document.getElementById('mi').focus(),80);
}
function openEdit(id){
  const n=nodes[id];if(!n)return;editId=id;
  document.getElementById('mt').textContent='Rediģēt';
  document.getElementById('mi').value=n.text;
  mcolor=n.color||'#e8694a';syncMC();
  document.getElementById('ov').classList.remove('hide');
  setTimeout(()=>document.getElementById('mi').focus(),80);
}
function closeModal(){document.getElementById('ov').classList.add('hide');editId=null;pendPos=null;}

function saveNode(){
  const txt=document.getElementById('mi').value.trim();
  if(!txt){document.getElementById('mi').focus();return;}
  if(editId){
    nodes[editId].text=txt;nodes[editId].color=mcolor;
    renderAll();
  } else {
    const w=document.getElementById('wrap');
    const cx=pendPos?pendPos.x:(w.clientWidth/2-px)/sc;
    const cy=pendPos?pendPos.y:(w.clientHeight/2-py)/sc;
    const id=newId();
    nodes[id]={id,text:txt,color:mcolor,x:cx-75+(Math.random()-.5)*80,y:cy-30+(Math.random()-.5)*60,isRoot:false};
    renderNode(nodes[id]);
    renderConns();
  }
  closeModal();
}

function addRoot(){
  const txt=prompt('Centrālā mezgla teksts:','Galvenā tēma');if(!txt)return;
  const w=document.getElementById('wrap');
  const id=newId();
  nodes[id]={id,text:txt.trim(),color,x:(w.clientWidth/2-px)/sc-80,y:(w.clientHeight/2-py)/sc-35,isRoot:true};
  renderNode(nodes[id]);renderConns();
}

function renderAll(){
  const cv=document.getElementById('cv');
  [...cv.children].forEach(el=>{if(!nodes[el.dataset.id])el.remove();});
  Object.values(nodes).forEach(n=>renderNode(n));
  renderConns();
}

function renderNode(n){
  const cv=document.getElementById('cv');
  let el=cv.querySelector('[data-id="'+n.id+'"]');
  if(!el){
    el=document.createElement('div');
    el.className='node'+(n.isRoot?' root':'');
    el.dataset.id=n.id;
    el.innerHTML='<div class="nt"></div><button class="ndel">×</button>';
    cv.appendChild(el);
    el.querySelector('.ndel').addEventListener('click',e=>{e.stopPropagation();delNode(n.id);});
    el.addEventListener('dblclick',e=>{e.stopPropagation();openEdit(n.id);});
    el.addEventListener('click',e=>{e.stopPropagation();if(mode==='conn')handleConn(n.id,el);});
    initDrag(el,n.id);
  }
  el.querySelector('.nt').textContent=n.text;
  el.style.background=n.color||'#e8694a';
  posEl(el,n.x,n.y);
}

function posEl(el,nx,ny){
  el.style.left=(nx*sc+px)+'px';
  el.style.top=(ny*sc+py)+'px';
  el.style.transform='scale('+sc+')';
  el.style.transformOrigin='top left';
}

function delNode(id){
  delete nodes[id];
  Object.keys(conns).forEach(cid=>{if(conns[cid].from===id||conns[cid].to===id)delete conns[cid];});
  renderAll();
}

function renderConns(){
  const svg=document.getElementById('svg');
  const defs=svg.querySelector('defs');
  svg.innerHTML='';svg.appendChild(defs);
  Object.entries(conns).forEach(([cid,c])=>{
    const fn=nodes[c.from],tn=nodes[c.to];if(!fn||!tn)return;
    const x1=fn.x*sc+px+75*sc,y1=fn.y*sc+py+30*sc,x2=tn.x*sc+px+75*sc,y2=tn.y*sc+py+30*sc,dx=x2-x1;
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d','M'+x1+','+y1+' C'+(x1+dx*.5)+','+y1+' '+(x2-dx*.5)+','+y2+' '+x2+','+y2);
    p.setAttribute('stroke',fn.color||'#888');p.setAttribute('stroke-width',Math.max(2,3*sc));
    p.setAttribute('fill','none');p.setAttribute('opacity','0.75');p.setAttribute('stroke-linecap','round');
    p.style.cursor='pointer';
    p.addEventListener('click',()=>{delete conns[cid];renderConns();});
    svg.appendChild(p);
  });
}

function initDrag(el,id){
  let sx,sy,snx,sny,moved;
  el.addEventListener('mousedown',e=>{
    if(mode==='conn'||e.target.classList.contains('ndel'))return;
    e.preventDefault();e.stopPropagation();
    sx=e.clientX;sy=e.clientY;snx=nodes[id].x;sny=nodes[id].y;moved=false;el.classList.add('drag');
    function mm(e2){
      const dx=(e2.clientX-sx)/sc,dy=(e2.clientY-sy)/sc;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;
      nodes[id].x=snx+dx;nodes[id].y=sny+dy;
      posEl(el,nodes[id].x,nodes[id].y);renderConns();
    }
    function mu(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);el.classList.remove('drag');}
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  el.addEventListener('touchstart',e=>{
    if(mode==='conn'||e.target.classList.contains('ndel'))return;
    e.stopPropagation();
    const t=e.touches[0];sx=t.clientX;sy=t.clientY;snx=nodes[id].x;sny=nodes[id].y;moved=false;el.classList.add('drag');
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    e.preventDefault();e.stopPropagation();
    const t=e.touches[0],dx=(t.clientX-sx)/sc,dy=(t.clientY-sy)/sc;
    moved=true;nodes[id].x=snx+dx;nodes[id].y=sny+dy;
    posEl(el,nodes[id].x,nodes[id].y);renderConns();
  },{passive:false});
  el.addEventListener('touchend',e=>{e.stopPropagation();el.classList.remove('drag');});
}

function handleConn(id,el){
  if(!connFrom){
    connFrom=id;document.querySelectorAll('.csrc').forEach(e=>e.classList.remove('csrc'));
    el.classList.add('csrc');setHint('🔗 Tagad klikšķini uz otrā mezgla');
  } else if(connFrom===id){
    connFrom=null;el.classList.remove('csrc');setHint('🔗 Klikšķini uz pirmā mezgla');
  } else {
    const a=connFrom,b=id;connFrom=null;
    document.querySelectorAll('.csrc').forEach(e=>e.classList.remove('csrc'));
    const dup=Object.values(conns).some(c=>(c.from===a&&c.to===b)||(c.from===b&&c.to===a));
    if(!dup){const cid=newCId();conns[cid]={from:a,to:b};renderConns();}
    setHint('✅ Savienots!');
  }
}

const wrap=document.getElementById('wrap');
wrap.addEventListener('dblclick',e=>{
  if(e.target!==wrap&&e.target!==document.getElementById('cv')&&!e.target.closest('#svg'))return;
  const r=wrap.getBoundingClientRect();
  openAdd((e.clientX-r.left-px)/sc-75,(e.clientY-r.top-py)/sc-30);
});

let panning=false,panSX,panSY;
wrap.addEventListener('mousedown',e=>{
  if(e.button===1||e.button===2){panning=true;panSX=e.clientX-px;panSY=e.clientY-py;wrap.style.cursor='grabbing';e.preventDefault();}
});
wrap.addEventListener('mousemove',e=>{if(!panning)return;px=e.clientX-panSX;py=e.clientY-panSY;reposAll();});
document.addEventListener('mouseup',()=>{if(panning){panning=false;wrap.style.cursor=mode==='conn'?'crosshair':'default';}});
wrap.addEventListener('contextmenu',e=>e.preventDefault());

wrap.addEventListener('wheel',e=>{
  e.preventDefault();const f=e.deltaY<0?1.1:0.91;
  const r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  px=mx-(mx-px)*f;py=my-(my-py)*f;
  sc=Math.min(Math.max(sc*f,0.2),3);reposAll();
},{passive:false});

function reposAll(){
  Object.values(nodes).forEach(n=>{const el=document.querySelector('[data-id="'+n.id+'"]');if(el)posEl(el,n.x,n.y);});
  renderConns();
}
function doZoom(f){const w=document.getElementById('wrap'),cx=w.clientWidth/2,cy=w.clientHeight/2;px=cx-(cx-px)*f;py=cy-(cy-py)*f;sc=Math.min(Math.max(sc*f,0.2),3);reposAll();}
function resetView(){sc=1;px=0;py=0;reposAll();}
function doClear(){if(confirm('Notīrīt visu?')){nodes={};conns={};document.getElementById('cv').innerHTML='';renderConns();}}

let ht;
function setHint(t){const el=document.getElementById('hint');el.textContent=t;el.style.opacity='1';clearTimeout(ht);ht=setTimeout(()=>el.style.opacity='0.55',5000);}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&!document.getElementById('ov').classList.contains('hide'))saveNode();
});
</script>
</body>
</html>
